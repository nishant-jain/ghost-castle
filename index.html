<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Castle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d0d; overflow: hidden; height: 100vh; width: 100vw; }
  svg { display: block; width: 100vw; height: 100vh; }

  /* Ghost — position controlled via JS, opacity transitions only */
  .ghost-anim {
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .ghost-bob { animation: ghost-float 3s ease-in-out infinite; }
  @keyframes ghost-float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-12px); }
  }
  .ghost-tail {
    animation: tail-sway 2.5s ease-in-out infinite;
    transform-origin: 0px 30px;
  }
  @keyframes tail-sway {
    0%, 100% { transform: skewX(0deg); }
    25%      { transform: skewX(5deg); }
    75%      { transform: skewX(-5deg); }
  }
  .ghost-glow { animation: glow-pulse 3s ease-in-out infinite; }
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.08; }
    50%      { opacity: 0.18; }
  }

  /* Parallax mountains — extremely subtle */
  .mountains-far  { animation: parallax-far  600s linear infinite; }
  .mountains-near { animation: parallax-near 400s linear infinite; }
  @keyframes parallax-far  { 0% { transform: translateX(0); } 100% { transform: translateX(-1920px); } }
  @keyframes parallax-near { 0% { transform: translateX(0); } 100% { transform: translateX(-1920px); } }

  /* Fog */
  .fog { opacity: 0; }
  .fog-1 { animation: fog-drift 22s linear infinite; }
  .fog-2 { animation: fog-drift 28s linear 8s infinite; }
  .fog-3 { animation: fog-drift 20s linear 14s infinite; }
  @keyframes fog-drift {
    0%   { transform: translateX(-500px); opacity: 0; }
    10%  { opacity: 0.06; }
    50%  { opacity: 0.1; }
    90%  { opacity: 0.04; }
    100% { transform: translateX(2200px); opacity: 0; }
  }

  /* Stars */
  .star { animation: twinkle 4s ease-in-out infinite; }
  .star:nth-child(2)  { animation-delay: 0.5s; }
  .star:nth-child(3)  { animation-delay: 1.2s; }
  .star:nth-child(4)  { animation-delay: 2.1s; }
  .star:nth-child(5)  { animation-delay: 0.8s; }
  .star:nth-child(6)  { animation-delay: 3.0s; }
  .star:nth-child(7)  { animation-delay: 1.7s; }
  .star:nth-child(8)  { animation-delay: 2.5s; }
  .star:nth-child(9)  { animation-delay: 1.0s; }
  .star:nth-child(10) { animation-delay: 3.5s; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50%      { opacity: 0.8; }
  }

  /* Lightning bolts */
  .lightning-bolt { opacity: 0; }
  .lightning-1 { animation: lflash-1 8s  linear infinite; }
  .lightning-2 { animation: lflash-2 11s linear infinite; }
  .lightning-3 { animation: lflash-3 14s linear infinite; }
  @keyframes lflash-1 {
    0%, 34%, 36%, 38.5%, 41%, 100% { opacity: 0; }
    34.5% { opacity: 0.95; }
    35%   { opacity: 0; }
    37%   { opacity: 0.75; }
    39%   { opacity: 0.5; }
  }
  @keyframes lflash-2 {
    0%, 60%, 62%, 65%, 100% { opacity: 0; }
    60.5% { opacity: 0.85; }
    61%   { opacity: 0; }
    62.5% { opacity: 0.65; }
  }
  @keyframes lflash-3 {
    0%, 20%, 22%, 24.5%, 100% { opacity: 0; }
    20.5% { opacity: 0.8; }
    21%   { opacity: 0; }
    22.5% { opacity: 0.55; }
    23%   { opacity: 0; }
    23.5% { opacity: 0.4; }
  }

  /* Sky flash */
  .sky-flash-1 { animation: skylight-1 8s  linear infinite; }
  .sky-flash-2 { animation: skylight-2 11s linear infinite; }
  .sky-flash-3 { animation: skylight-3 14s linear infinite; }
  @keyframes skylight-1 {
    0%, 34%, 41%, 100% { opacity: 0; }
    34.5% { opacity: 0.18; } 35% { opacity: 0; }
    37%   { opacity: 0.12; }
  }
  @keyframes skylight-2 {
    0%, 60%, 65%, 100% { opacity: 0; }
    60.5% { opacity: 0.16; }
    62.5% { opacity: 0.09; }
  }
  @keyframes skylight-3 {
    0%, 20%, 24.5%, 100% { opacity: 0; }
    20.5% { opacity: 0.14; }
    22.5% { opacity: 0.09; }
  }

  /* Castle illumination flash — much brighter */
  .castle-flash-1 { animation: castlelight-1 8s  linear infinite; }
  .castle-flash-2 { animation: castlelight-2 11s linear infinite; }
  .castle-flash-3 { animation: castlelight-3 14s linear infinite; }
  @keyframes castlelight-1 {
    0%, 34%, 41%, 100% { opacity: 0; }
    34.5% { opacity: 0.85; } 35% { opacity: 0.1; }
    37%   { opacity: 0.6; }
    39%   { opacity: 0.32; }
  }
  @keyframes castlelight-2 {
    0%, 60%, 65%, 100% { opacity: 0; }
    60.5% { opacity: 0.78; } 61% { opacity: 0.08; }
    62.5% { opacity: 0.52; }
  }
  @keyframes castlelight-3 {
    0%, 20%, 24.5%, 100% { opacity: 0; }
    20.5% { opacity: 0.72; } 21% { opacity: 0.06; }
    22.5% { opacity: 0.46; }
    23.5% { opacity: 0.22; }
  }

  /* Window candlelight flicker — soft amber glow, each window independent */
  .win-1 { animation: win-flicker-1 22s linear -3s  infinite; }
  .win-2 { animation: win-flicker-2 31s linear -17s infinite; }
  .win-3 { animation: win-flicker-3 19s linear -8s  infinite; }
  .win-4 { animation: win-flicker-4 27s linear -5s  infinite; }
  .win-5 { animation: win-flicker-5 24s linear -13s infinite; }
  .win-6 { animation: win-flicker-6 35s linear -22s infinite; }
  .win-7 { animation: win-flicker-7 18s linear -9s  infinite; }
  .win-8 { animation: win-flicker-8 29s linear -1s  infinite; }
  .win-9 { animation: win-flicker-9 23s linear -11s infinite; }
  .win-10 { animation: win-flicker-10 33s linear -7s  infinite; }
  @keyframes win-flicker-1 {
    0%,100%  { opacity: 0.04; }
    11%      { opacity: 0.04; }
    12%      { opacity: 0.32; }
    12.8%    { opacity: 0.13; }
    13.5%    { opacity: 0.29; }
    14.2%    { opacity: 0.31; }
    16%      { opacity: 0.05; }
    43%      { opacity: 0.03; }
    44%      { opacity: 0.25; }
    44.6%    { opacity: 0.08; }
    45.2%    { opacity: 0.27; }
    47%      { opacity: 0.04; }
    79%      { opacity: 0.03; }
  }
  @keyframes win-flicker-2 {
    0%,100%  { opacity: 0.03; }
    6%       { opacity: 0.03; }
    7%       { opacity: 0.34; }
    7.5%     { opacity: 0.11; }
    8%       { opacity: 0.30; }
    8.8%     { opacity: 0.33; }
    10%      { opacity: 0.04; }
    57%      { opacity: 0.04; }
    58%      { opacity: 0.27; }
    58.8%    { opacity: 0.09; }
    59.5%    { opacity: 0.28; }
    61%      { opacity: 0.04; }
    88%      { opacity: 0.03; }
  }
  @keyframes win-flicker-3 {
    0%,100%  { opacity: 0.05; }
    24%      { opacity: 0.05; }
    25%      { opacity: 0.24; }
    25.7%    { opacity: 0.07; }
    26.4%    { opacity: 0.26; }
    26.9%    { opacity: 0.25; }
    28%      { opacity: 0.05; }
    67%      { opacity: 0.03; }
    68%      { opacity: 0.30; }
    68.6%    { opacity: 0.12; }
    69.3%    { opacity: 0.28; }
    70.5%    { opacity: 0.04; }
  }
  @keyframes win-flicker-4 {
    0%,100%  { opacity: 0.03; }
    33%      { opacity: 0.03; }
    34%      { opacity: 0.36; }
    34.4%    { opacity: 0.09; }
    35%      { opacity: 0.33; }
    35.8%    { opacity: 0.34; }
    37%      { opacity: 0.04; }
    71%      { opacity: 0.03; }
    72%      { opacity: 0.21; }
    72.8%    { opacity: 0.05; }
    73.5%    { opacity: 0.22; }
    75%      { opacity: 0.03; }
  }
  @keyframes win-flicker-5 {
    0%,100%  { opacity: 0.04; }
    18%      { opacity: 0.04; }
    19%      { opacity: 0.28; }
    19.6%    { opacity: 0.10; }
    20.3%    { opacity: 0.26; }
    21%      { opacity: 0.27; }
    22.5%    { opacity: 0.05; }
    52%      { opacity: 0.03; }
    53%      { opacity: 0.32; }
    53.5%    { opacity: 0.07; }
    54.2%    { opacity: 0.30; }
    55.5%    { opacity: 0.04; }
    84%      { opacity: 0.03; }
  }
  @keyframes win-flicker-6 {
    0%,100%  { opacity: 0.03; }
    8%       { opacity: 0.03; }
    9%       { opacity: 0.25; }
    9.7%     { opacity: 0.06; }
    10.4%    { opacity: 0.23; }
    11%      { opacity: 0.24; }
    12.5%    { opacity: 0.04; }
    38%      { opacity: 0.03; }
    39%      { opacity: 0.30; }
    39.6%    { opacity: 0.10; }
    40.3%    { opacity: 0.29; }
    41.5%    { opacity: 0.04; }
    74%      { opacity: 0.03; }
    75%      { opacity: 0.27; }
    75.6%    { opacity: 0.08; }
    76.3%    { opacity: 0.25; }
    77.5%    { opacity: 0.03; }
    93%      { opacity: 0.03; }
  }
  @keyframes win-flicker-7 {
    0%,100%  { opacity: 0.05; }
    29%      { opacity: 0.05; }
    30%      { opacity: 0.38; }
    30.5%    { opacity: 0.13; }
    31.2%    { opacity: 0.34; }
    32%      { opacity: 0.35; }
    33.5%    { opacity: 0.06; }
    61%      { opacity: 0.03; }
    62%      { opacity: 0.21; }
    62.8%    { opacity: 0.06; }
    63.5%    { opacity: 0.23; }
    65%      { opacity: 0.04; }
  }
  @keyframes win-flicker-8 {
    0%,100%  { opacity: 0.03; }
    47%      { opacity: 0.03; }
    48%      { opacity: 0.33; }
    48.5%    { opacity: 0.09; }
    49.2%    { opacity: 0.31; }
    50%      { opacity: 0.32; }
    51.5%    { opacity: 0.04; }
    82%      { opacity: 0.03; }
    83%      { opacity: 0.19; }
    83.8%    { opacity: 0.04; }
    84.5%    { opacity: 0.20; }
    86%      { opacity: 0.03; }
  }
  @keyframes win-flicker-9 {
    0%,100%  { opacity: 0.04; }
    15%      { opacity: 0.04; }
    16%      { opacity: 0.29; }
    16.7%    { opacity: 0.10; }
    17.4%    { opacity: 0.26; }
    18.2%    { opacity: 0.28; }
    20%      { opacity: 0.05; }
    55%      { opacity: 0.03; }
    56%      { opacity: 0.35; }
    56.6%    { opacity: 0.11; }
    57.3%    { opacity: 0.32; }
    59%      { opacity: 0.04; }
    87%      { opacity: 0.03; }
  }
  @keyframes win-flicker-10 {
    0%,100%  { opacity: 0.03; }
    22%      { opacity: 0.03; }
    23%      { opacity: 0.27; }
    23.8%    { opacity: 0.08; }
    24.5%    { opacity: 0.24; }
    25.3%    { opacity: 0.26; }
    27%      { opacity: 0.04; }
    64%      { opacity: 0.03; }
    65%      { opacity: 0.31; }
    65.7%    { opacity: 0.07; }
    66.4%    { opacity: 0.29; }
    68%      { opacity: 0.03; }
    91%      { opacity: 0.03; }
  }

  /* Clouds — parallax by altitude: lower clouds move faster and farther */
  /* cloud-1 y~128 (highest/farthest) */
  .cloud-1 { animation: cdrift-1 58s linear infinite; }
  /* cloud-2 y~163 */
  .cloud-2 { animation: cdrift-2 44s linear 6s infinite; }
  /* cloud-3 y~198 */
  .cloud-3 { animation: cdrift-3 30s linear infinite; }
  /* cloud-4 y~315 (low/near) */
  .cloud-4 { animation: cdrift-4 16s linear 4s infinite; }
  /* cloud-5 y~272 */
  .cloud-5 { animation: cdrift-5 22s linear 11s infinite; }
  /* cloud-6 y~220 */
  .cloud-6 { animation: cdrift-6 34s linear 20s infinite; }
  /* cloud-7 y~294 */
  .cloud-7 { animation: cdrift-7 19s linear 2s  infinite; }
  /* cloud-8 y~344 (lowest/nearest/fastest) */
  .cloud-8 { animation: cdrift-8 12s linear 8s  infinite; }
  /* cloud-9 y~175 */
  .cloud-9 { animation: cdrift-9 72s linear 30s infinite; }
  /* All clouds move right-to-left (storm wind), nearer = larger translateX */
  @keyframes cdrift-1 { 0% { transform: translateX(0); } 100% { transform: translateX(-260px); } }
  @keyframes cdrift-2 { 0% { transform: translateX(0); } 100% { transform: translateX(-310px); } }
  @keyframes cdrift-3 { 0% { transform: translateX(0); } 100% { transform: translateX(-340px); } }
  @keyframes cdrift-4 { 0% { transform: translateX(0); } 100% { transform: translateX(-520px); } }
  @keyframes cdrift-5 { 0% { transform: translateX(0); } 100% { transform: translateX(-410px); } }
  @keyframes cdrift-6 { 0% { transform: translateX(0); } 100% { transform: translateX(-310px); } }
  @keyframes cdrift-7 { 0% { transform: translateX(0); } 100% { transform: translateX(-440px); } }
  @keyframes cdrift-8 { 0% { transform: translateX(0); } 100% { transform: translateX(-820px); } }
  @keyframes cdrift-9 { 0% { transform: translateX(0); } 100% { transform: translateX(-195px); } }

  /* Tree wind sway — strong gusting wind */
  .tree { animation: tree-sway 1.8s ease-in-out infinite; }
  @keyframes tree-sway {
    0%, 100% { transform: rotate(0deg); }
    20%  { transform: rotate(7deg); }
    55%  { transform: rotate(-6deg); }
    80%  { transform: rotate(5deg); }
  }
  /* Per-tree: pivot at base, varied timing */
  .tree-1  { transform-origin:  300px 850px; animation-duration: 1.9s; animation-delay: 0.0s; }
  .tree-2  { transform-origin:  390px 850px; animation-duration: 1.7s; animation-delay: 0.2s; }
  .tree-3  { transform-origin:  470px 850px; animation-duration: 2.0s; animation-delay: 0.5s; }
  .tree-4  { transform-origin:  545px 850px; animation-duration: 1.6s; animation-delay: 0.1s; }
  .tree-5  { transform-origin:  618px 850px; animation-duration: 1.8s; animation-delay: 0.4s; }
  .tree-6  { transform-origin: 1327px 850px; animation-duration: 1.9s; animation-delay: 0.3s; }
  .tree-7  { transform-origin: 1405px 850px; animation-duration: 1.7s; animation-delay: 0.6s; }
  .tree-8  { transform-origin: 1478px 850px; animation-duration: 2.1s; animation-delay: 0.1s; }
  .tree-9  { transform-origin: 1558px 850px; animation-duration: 1.6s; animation-delay: 0.5s; }
  .tree-10 { transform-origin: 1640px 850px; animation-duration: 1.9s; animation-delay: 0.2s; }
  .tree-11 { transform-origin:  180px 850px; animation-duration: 2.2s; animation-delay: 0.3s; }
  .tree-12 { transform-origin:  240px 850px; animation-duration: 1.8s; animation-delay: 0.7s; }
  .tree-13 { transform-origin:  680px 850px; animation-duration: 1.5s; animation-delay: 0.6s; }
  .tree-14 { transform-origin:  105px 850px; animation-duration: 2.4s; animation-delay: 0.1s; }
  .tree-15 { transform-origin: 1760px 850px; animation-duration: 2.1s; animation-delay: 0.4s; }
  .tree-16 { transform-origin: 1840px 850px; animation-duration: 2.5s; animation-delay: 0.0s; }
  .tree-17 { transform-origin: 1250px 850px; animation-duration: 1.6s; animation-delay: 0.8s; }
  .tree-18 { transform-origin: 1700px 850px; animation-duration: 2.0s; animation-delay: 0.2s; }

  /* Bats — wing flap */
  .bat-wl {
    transform-box: fill-box; transform-origin: 100% 40%;
    animation: bat-flap-l 0.22s ease-in-out infinite;
  }
  .bat-wr {
    transform-box: fill-box; transform-origin: 0% 40%;
    animation: bat-flap-r 0.22s ease-in-out infinite;
  }
  @keyframes bat-flap-l { 0%,100% { transform: rotate(-22deg); } 50% { transform: rotate(14deg); } }
  @keyframes bat-flap-r { 0%,100% { transform: rotate(22deg); }  50% { transform: rotate(-14deg); } }

  /* Bat flight — appears occasionally, invisible most of the time */
  .bat-1 { animation: bat1-fly 55s linear       0s  infinite; }
  .bat-2 { animation: bat2-fly 68s linear       8s  infinite; }
  .bat-3 { animation: bat3-fly 42s linear       20s infinite; }
  @keyframes bat1-fly {
    0%    { transform: translate(-80px,310px);          opacity: 0; }
    2%    { transform: translate(-55px,307px);          opacity: 0.7; }
    20%   { transform: translate(2020px,284px);         opacity: 0.65; }
    22%   { transform: translate(2100px,287px);         opacity: 0; }
    22.1% { transform: translate(-80px,310px);          opacity: 0; }
    100%  { transform: translate(-80px,310px);          opacity: 0; }
  }
  @keyframes bat2-fly {
    0%    { transform: translate(2000px,258px) scaleX(-1); opacity: 0; }
    1.5%  { transform: translate(1978px,255px) scaleX(-1); opacity: 0.6; }
    17%   { transform: translate(-60px,239px)  scaleX(-1); opacity: 0.55; }
    19%   { transform: translate(-120px,241px) scaleX(-1); opacity: 0; }
    19.1% { transform: translate(2000px,258px) scaleX(-1); opacity: 0; }
    100%  { transform: translate(2000px,258px) scaleX(-1); opacity: 0; }
  }
  @keyframes bat3-fly {
    0%    { transform: translate(-80px,338px);          opacity: 0; }
    3%    { transform: translate(-50px,335px);          opacity: 0.55; }
    24%   { transform: translate(2020px,317px);         opacity: 0.5; }
    26%   { transform: translate(2100px,319px);         opacity: 0; }
    26.1% { transform: translate(-80px,338px);          opacity: 0; }
    100%  { transform: translate(-80px,338px);          opacity: 0; }
  }

  /* Storm leaves */
  .leaf { opacity: 0; }
  .leaf-1  { animation: leaf-fly-a 9s  linear       0s  infinite; }
  .leaf-2  { animation: leaf-fly-b 7s  ease-in      3s  infinite; }
  .leaf-3  { animation: leaf-fly-c 11s linear       7s  infinite; }
  .leaf-4  { animation: leaf-fly-a 8s  ease-in-out  1s  infinite; }
  .leaf-5  { animation: leaf-fly-d 6s  linear       5s  infinite; }
  .leaf-6  { animation: leaf-fly-b 10s linear       9s  infinite; }
  .leaf-7  { animation: leaf-fly-e 8s  ease-in-out  2s  infinite; }
  .leaf-8  { animation: leaf-fly-c 7s  linear       11s infinite; }
  .leaf-9  { animation: leaf-fly-d 9s  ease-in      4s  infinite; }
  .leaf-10 { animation: leaf-fly-e 6s  linear       8s  infinite; }
  @keyframes leaf-fly-a {
    0%   { transform: translate(1980px,648px) rotate(0deg)    scale(1);   opacity: 0; }
    6%   { opacity: 0.65; }
    88%  { opacity: 0.45; }
    100% { transform: translate(-80px,718px)  rotate(-700deg) scale(1);   opacity: 0; }
  }
  @keyframes leaf-fly-b {
    0%   { transform: translate(1980px,430px) rotate(40deg)   scale(0.7); opacity: 0; }
    6%   { opacity: 0.6; }
    88%  { opacity: 0.4; }
    100% { transform: translate(-80px,498px)  rotate(360deg)  scale(0.7); opacity: 0; }
  }
  @keyframes leaf-fly-c {
    0%   { transform: translate(1980px,555px) rotate(-30deg)  scale(1.2); opacity: 0; }
    6%   { opacity: 0.65; }
    50%  { transform: translate(920px,510px)  rotate(180deg)  scale(1.2); }
    88%  { opacity: 0.45; }
    100% { transform: translate(-80px,568px)  rotate(480deg)  scale(1.2); opacity: 0; }
  }
  @keyframes leaf-fly-d {
    0%   { transform: translate(1980px,720px) rotate(15deg)   scale(0.9); opacity: 0; }
    6%   { opacity: 0.7; }
    88%  { opacity: 0.5; }
    100% { transform: translate(-80px,798px)  rotate(-540deg) scale(0.9); opacity: 0; }
  }
  @keyframes leaf-fly-e {
    0%   { transform: translate(1980px,340px) rotate(-60deg)  scale(0.65); opacity: 0; }
    6%   { opacity: 0.55; }
    45%  { transform: translate(1100px,370px) rotate(-200deg) scale(0.65); }
    88%  { opacity: 0.35; }
    100% { transform: translate(-80px,438px)  rotate(-680deg) scale(0.65); opacity: 0; }
  }

  /* Sound button */
  #sound-btn {
    position: fixed; bottom: 18px; right: 18px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.45);
    font-family: sans-serif; font-size: 11px;
    padding: 6px 10px; border-radius: 4px;
    cursor: pointer; user-select: none; letter-spacing: 0.05em;
  }
  #sound-btn:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<button id="sound-btn">click for sound</button>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080808"/>
      <stop offset="50%"  stop-color="#111"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="ghostGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>

  <use class="leaf leaf-1"  href="#leaf-shape"/>
  <use class="leaf leaf-2"  href="#leaf-shape"/>
  <use class="leaf leaf-3"  href="#leaf-shape"/>
  <use class="leaf leaf-4"  href="#leaf-shape"/>
  <use class="leaf leaf-5"  href="#leaf-shape"/>
  <use class="leaf leaf-6"  href="#leaf-shape"/>
  <use class="leaf leaf-7"  href="#leaf-shape"/>
  <use class="leaf leaf-8"  href="#leaf-shape"/>
  <use class="leaf leaf-9"  href="#leaf-shape"/>
  <use class="leaf leaf-10" href="#leaf-shape"/>

  <!-- Fog wisps -->
  <ellipse class="fog fog-1" cx="300"  cy="820" rx="280" ry="12" fill="white"/>
  <ellipse class="fog fog-2" cx="900"  cy="840" rx="320" ry="10" fill="white"/>
  <ellipse class="fog fog-3" cx="1500" cy="825" rx="220" ry="8"  fill="white"/>

  <!-- Ghost — outer: roam+fade, inner: bob -->
  <g id="ghost-outer" class="ghost-anim">
    <g class="ghost-bob">
      <ellipse class="ghost-glow" cx="0" cy="10" rx="80" ry="80" fill="url(#ghostGlow)"/>
      <g fill="rgba(100,100,100,0.26)">
        <ellipse cx="0" cy="-18" rx="25" ry="28"/>
        <rect x="-25" y="-18" width="50" height="50" rx="2"/>
        <g class="ghost-tail">
          <path d="M-25,32 Q-18,50 -12,32 Q-6,50 0,32 Q6,50 12,32 Q18,50 25,32 L25,-1 L-25,-1 Z"
                fill="rgba(100,100,100,0.26)"/>
        </g>
      </g>
      <ellipse cx="-9"  cy="-14" rx="6" ry="7" fill="rgba(12,12,12,0.7)"/>
      <ellipse cx="9"   cy="-14" rx="6" ry="7" fill="rgba(12,12,12,0.7)"/>
      <circle  cx="-7"  cy="-16" r="2"          fill="rgba(140,140,140,0.15)"/>
      <circle  cx="11"  cy="-16" r="2"          fill="rgba(140,140,140,0.15)"/>
      <ellipse cx="0"   cy="4"   rx="5" ry="6"  fill="rgba(12,12,12,0.7)"/>
    </g>
  </g>

</svg>

<script>
// ─── Ghost: flicker between trees and castle, visible < 2s at a time ─────────
const ghostEl = document.getElementById('ghost-outer');

// Spawn positions spread across the full scene:
// left trees (x≈80–680), castle front (x≈720–1200), right trees (x≈1250–1900)
const ghostPositions = [
  // outer left (tall trees)
  { x: 88,   y: 776 }, { x: 148,  y: 779 },
  // inner left
  { x: 210,  y: 781 }, { x: 295,  y: 782 }, { x: 375,  y: 780 },
  { x: 455,  y: 783 }, { x: 540,  y: 781 }, { x: 625,  y: 782 },
  // castle front
  { x: 730,  y: 784 }, { x: 830,  y: 783 }, { x: 940,  y: 785 },
  { x: 1050, y: 783 }, { x: 1150, y: 784 },
  // inner right
  { x: 1265, y: 782 }, { x: 1355, y: 780 }, { x: 1445, y: 783 },
  { x: 1540, y: 781 }, { x: 1635, y: 782 },
  // outer right (tall trees)
  { x: 1720, y: 779 }, { x: 1810, y: 777 }, { x: 1880, y: 775 },
];

let lastPosIdx = -1;

(function ghostLoop() {
  // Pick a new position, avoiding the same spot twice in a row
  let idx;
  do { idx = Math.floor(Math.random() * ghostPositions.length); } while (idx === lastPosIdx);
  lastPosIdx = idx;
  const { x, y } = ghostPositions[idx];

  // Teleport while invisible, then fade in
  ghostEl.style.transform = `translate(${x}px, ${y}px) scale(0.5)`;

  requestAnimationFrame(() => requestAnimationFrame(() => {
    ghostEl.style.opacity = '1';

    // Visible for 500–1900ms (always < 2s)
    const visibleMs = 500 + Math.random() * 1400;
    setTimeout(() => {
      ghostEl.style.opacity = '0';

      // Hidden for 3–10s before reappearing elsewhere
      const hiddenMs = 3000 + Math.random() * 7000;
      setTimeout(ghostLoop, hiddenMs);
    }, visibleMs);
  }));
})();

// ─── Audio ────────────────────────────────────────────────────────────────────
let audioReady = false;
let audioCtx;

document.getElementById('sound-btn').addEventListener('click', function() {
  if (audioReady) return;
  audioReady = true;
  this.textContent = 'sound on';

  const AC = window.AudioContext || window.webkitAudioContext;
  audioCtx = new AC();

  function noiseBuffer(sec) {
    const n = Math.ceil(audioCtx.sampleRate * sec);
    const b = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
    const d = b.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    return b;
  }

  // ── Wind — multi-layer filtered noise with irregular gusting ──────────────
  const windNoise = audioCtx.createBufferSource();
  windNoise.buffer = noiseBuffer(8);
  windNoise.loop = true;

  // Low drone (gives weight and presence)
  const wLow = audioCtx.createBiquadFilter();
  wLow.type = 'lowpass';
  wLow.frequency.value = 90;
  wLow.Q.value = 0.5;
  const wLowGain = audioCtx.createGain();
  wLowGain.gain.value = 0.18;

  // Main howl resonance
  const wMid1 = audioCtx.createBiquadFilter();
  wMid1.type = 'bandpass';
  wMid1.frequency.value = 220;
  wMid1.Q.value = 2.2;
  const wMid1Gain = audioCtx.createGain();
  wMid1Gain.gain.value = 0.32;

  // Upper howl
  const wMid2 = audioCtx.createBiquadFilter();
  wMid2.type = 'bandpass';
  wMid2.frequency.value = 520;
  wMid2.Q.value = 1.6;
  const wMid2Gain = audioCtx.createGain();
  wMid2Gain.gain.value = 0.22;

  // Whistle overtone (very subtle)
  const wHi = audioCtx.createBiquadFilter();
  wHi.type = 'bandpass';
  wHi.frequency.value = 1400;
  wHi.Q.value = 3.5;
  const wHiGain = audioCtx.createGain();
  wHiGain.gain.value = 0.06;

  // Mix all wind layers
  const windMaster = audioCtx.createGain();
  windMaster.gain.value = 0.55;

  windNoise.connect(wLow);   wLow.connect(wLowGain);   wLowGain.connect(windMaster);
  windNoise.connect(wMid1);  wMid1.connect(wMid1Gain); wMid1Gain.connect(windMaster);
  windNoise.connect(wMid2);  wMid2.connect(wMid2Gain); wMid2Gain.connect(windMaster);
  windNoise.connect(wHi);    wHi.connect(wHiGain);     wHiGain.connect(windMaster);
  windMaster.connect(audioCtx.destination);

  // Two slow LFOs at slightly different rates — creates organic, irregular gusting
  const gustA = audioCtx.createOscillator();
  gustA.frequency.value = 0.08;
  const gustAGain = audioCtx.createGain();
  gustAGain.gain.value = 0.14;
  gustA.connect(gustAGain);
  gustAGain.connect(windMaster.gain);

  const gustB = audioCtx.createOscillator();
  gustB.frequency.value = 0.19;
  const gustBGain = audioCtx.createGain();
  gustBGain.gain.value = 0.08;
  gustB.connect(gustBGain);
  gustBGain.connect(windMaster.gain);

  // Slowly sweep the main howl frequency for extra organic quality
  wMid1.frequency.setValueAtTime(220, audioCtx.currentTime);
  wMid1.frequency.linearRampToValueAtTime(280, audioCtx.currentTime + 12);
  wMid1.frequency.linearRampToValueAtTime(195, audioCtx.currentTime + 26);
  wMid1.frequency.linearRampToValueAtTime(245, audioCtx.currentTime + 40);

  windNoise.start();
  gustA.start();
  gustB.start();

  // ── Leaf rustle — stochastic texture with natural amplitude variation ──────
  const leafNoise = audioCtx.createBufferSource();
  leafNoise.buffer = noiseBuffer(6);
  leafNoise.loop = true;

  // Bandpass centered in leaf-crinkle range
  const leafBP = audioCtx.createBiquadFilter();
  leafBP.type = 'bandpass';
  leafBP.frequency.value = 3200;
  leafBP.Q.value = 0.8;

  // Crisp high shelf
  const leafHP = audioCtx.createBiquadFilter();
  leafHP.type = 'highpass';
  leafHP.frequency.value = 4800;

  const leafMaster = audioCtx.createGain();
  leafMaster.gain.value = 0.045;

  leafNoise.connect(leafBP);
  leafBP.connect(leafHP);
  leafHP.connect(leafMaster);
  leafMaster.connect(audioCtx.destination);

  // Use a second slow noise source through a lowpass as an irregular AM envelope
  // This sounds far more natural than a fixed tremolo oscillator
  const leafAMNoise = audioCtx.createBufferSource();
  leafAMNoise.buffer = noiseBuffer(4);
  leafAMNoise.loop = true;
  const leafAMLP = audioCtx.createBiquadFilter();
  leafAMLP.type = 'lowpass';
  leafAMLP.frequency.value = 6;
  const leafAMGain = audioCtx.createGain();
  leafAMGain.gain.value = 0.03;
  leafAMNoise.connect(leafAMLP);
  leafAMLP.connect(leafAMGain);
  leafAMGain.connect(leafMaster.gain);

  // Couple leaf rustle intensity to wind gusting — share one of the gust LFOs
  const leafGustGain = audioCtx.createGain();
  leafGustGain.gain.value = 0.018;
  gustA.connect(leafGustGain);
  leafGustGain.connect(leafMaster.gain);

  leafNoise.start();
  leafAMNoise.start();

  // ── Owl calls — sine with vibrato + second harmonic + breath noise ─────────
  function playOwl() {
    const t = audioCtx.currentTime;

    // Vibrato LFO
    const vibLFO = audioCtx.createOscillator();
    vibLFO.frequency.value = 5.8;
    const vibDepth = audioCtx.createGain();
    vibDepth.gain.value = 9;

    // Fundamental
    const osc1 = audioCtx.createOscillator();
    osc1.type = 'sine';
    // Second harmonic (gives the hooting its characteristic timbre)
    const osc2 = audioCtx.createOscillator();
    osc2.type = 'sine';

    vibLFO.connect(vibDepth);
    vibDepth.connect(osc1.frequency);
    vibDepth.connect(osc2.frequency);

    const g1 = audioCtx.createGain();  g1.gain.value = 0;
    const g2 = audioCtx.createGain();  g2.gain.value = 0;

    // Breath/air noise through narrow bandpass
    const breathSrc = audioCtx.createBufferSource();
    breathSrc.buffer = noiseBuffer(2.5);
    const breathBP = audioCtx.createBiquadFilter();
    breathBP.type = 'bandpass';
    breathBP.frequency.value = 290;
    breathBP.Q.value = 3.5;
    const breathGain = audioCtx.createGain(); breathGain.gain.value = 0;

    breathSrc.connect(breathBP);
    breathBP.connect(breathGain);
    breathGain.connect(audioCtx.destination);

    osc1.connect(g1); g1.connect(audioCtx.destination);
    osc2.connect(g2); g2.connect(audioCtx.destination);

    osc1.start(t); osc2.start(t); vibLFO.start(t); breathSrc.start(t);

    // Hoot 1
    const f1 = 285 + Math.random() * 20;
    osc1.frequency.setValueAtTime(f1, t);
    osc1.frequency.linearRampToValueAtTime(f1 * 0.82, t + 0.58);
    osc2.frequency.setValueAtTime(f1 * 2.01, t);
    osc2.frequency.linearRampToValueAtTime(f1 * 2.01 * 0.82, t + 0.58);

    g1.gain.setValueAtTime(0, t);
    g1.gain.linearRampToValueAtTime(0.13, t + 0.07);
    g1.gain.setValueAtTime(0.13, t + 0.42);
    g1.gain.linearRampToValueAtTime(0, t + 0.62);
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(0.042, t + 0.07);
    g2.gain.setValueAtTime(0.042, t + 0.42);
    g2.gain.linearRampToValueAtTime(0, t + 0.62);
    breathGain.gain.setValueAtTime(0, t);
    breathGain.gain.linearRampToValueAtTime(0.018, t + 0.04);
    breathGain.gain.linearRampToValueAtTime(0, t + 0.65);

    // Hoot 2 (slight pitch variation)
    const f2 = f1 + 12 + Math.random() * 15;
    osc1.frequency.setValueAtTime(f2, t + 0.92);
    osc1.frequency.linearRampToValueAtTime(f2 * 0.83, t + 1.52);
    osc2.frequency.setValueAtTime(f2 * 2.01, t + 0.92);
    osc2.frequency.linearRampToValueAtTime(f2 * 2.01 * 0.83, t + 1.52);

    g1.gain.setValueAtTime(0, t + 0.92);
    g1.gain.linearRampToValueAtTime(0.11, t + 0.99);
    g1.gain.setValueAtTime(0.11, t + 1.35);
    g1.gain.linearRampToValueAtTime(0, t + 1.56);
    g2.gain.setValueAtTime(0, t + 0.92);
    g2.gain.linearRampToValueAtTime(0.036, t + 0.99);
    g2.gain.setValueAtTime(0.036, t + 1.35);
    g2.gain.linearRampToValueAtTime(0, t + 1.56);
    breathGain.gain.setValueAtTime(0, t + 0.92);
    breathGain.gain.linearRampToValueAtTime(0.015, t + 0.96);
    breathGain.gain.linearRampToValueAtTime(0, t + 1.58);

    const stop = t + 1.8;
    osc1.stop(stop); osc2.stop(stop); vibLFO.stop(stop);
  }

  function schedOwl() {
    playOwl();
    setTimeout(schedOwl, 9000 + Math.random() * 15000);
  }
  setTimeout(schedOwl, 1200);
  setTimeout(schedOwl, 6500 + Math.random() * 3000);

  // ── Thunder — crack + body boom + 3 staggered rumble echoes ─────────────
  function thunder(vol) {
    const t = audioCtx.currentTime;

    // Crack: broadband transient — dies in ~45ms (real lightning strike)
    const crackSrc = audioCtx.createBufferSource();
    crackSrc.buffer = noiseBuffer(0.2);
    const crackHP = audioCtx.createBiquadFilter();
    crackHP.type = 'highpass'; crackHP.frequency.value = 200;
    const crackEnv = audioCtx.createGain();
    crackEnv.gain.setValueAtTime(vol * 1.9, t);
    crackEnv.gain.exponentialRampToValueAtTime(vol * 0.06, t + 0.045);
    crackEnv.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    crackSrc.connect(crackHP); crackHP.connect(crackEnv);
    crackEnv.connect(audioCtx.destination);
    crackSrc.start(t);

    // Sub-bass punch: 55Hz sine burst — the physical chest-thud of a nearby strike
    const punch = audioCtx.createOscillator();
    punch.type = 'sine'; punch.frequency.value = 55;
    const punchEnv = audioCtx.createGain();
    punchEnv.gain.setValueAtTime(0, t);
    punchEnv.gain.linearRampToValueAtTime(vol * 0.75, t + 0.005);
    punchEnv.gain.exponentialRampToValueAtTime(0.001, t + 0.085);
    punch.connect(punchEnv); punchEnv.connect(audioCtx.destination);
    punch.start(t); punch.stop(t + 0.1);

    // Body boom — two bandpass resonances characteristic of real thunder (100–350Hz)
    // Low resonance: dominant boom
    const b1 = audioCtx.createBufferSource(); b1.buffer = noiseBuffer(3.5);
    const b1BP = audioCtx.createBiquadFilter();
    b1BP.type = 'bandpass'; b1BP.frequency.value = 118; b1BP.Q.value = 1.3;
    const b1Env = audioCtx.createGain();
    b1Env.gain.setValueAtTime(0, t);
    b1Env.gain.linearRampToValueAtTime(vol * 1.15, t + 0.018);
    b1Env.gain.exponentialRampToValueAtTime(vol * 0.48, t + 0.26);
    b1Env.gain.exponentialRampToValueAtTime(0.001, t + 3.0);
    b1.connect(b1BP); b1BP.connect(b1Env); b1Env.connect(audioCtx.destination);
    b1.start(t);

    // Mid resonance: crackle texture layered over the boom
    const b2 = audioCtx.createBufferSource(); b2.buffer = noiseBuffer(2.5);
    const b2BP = audioCtx.createBiquadFilter();
    b2BP.type = 'bandpass'; b2BP.frequency.value = 310; b2BP.Q.value = 0.9;
    const b2Env = audioCtx.createGain();
    b2Env.gain.setValueAtTime(0, t);
    b2Env.gain.linearRampToValueAtTime(vol * 0.62, t + 0.022);
    b2Env.gain.exponentialRampToValueAtTime(vol * 0.18, t + 0.32);
    b2Env.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
    b2.connect(b2BP); b2BP.connect(b2Env); b2Env.connect(audioCtx.destination);
    b2.start(t);

    // Rolling rumble: 3 staggered low-pass noise sources at different delays,
    // simulating the near/mid/far echo reflections off terrain and clouds.
    // Each is quieter and lower-frequency than the last — this creates the
    // characteristic rolling quality without any artificial swell.
    function rumbleLayer(delay, lpFreq, peakVol, decayEnd) {
      const src = audioCtx.createBufferSource();
      src.buffer = noiseBuffer(decayEnd - delay + 0.5);
      const lp = audioCtx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = lpFreq; lp.Q.value = 0.5;
      const env = audioCtx.createGain();
      const s = t + delay;
      env.gain.setValueAtTime(0, s);
      env.gain.linearRampToValueAtTime(peakVol, s + 0.12);
      env.gain.exponentialRampToValueAtTime(peakVol * 0.35, s + 0.9);
      env.gain.exponentialRampToValueAtTime(0.001, t + decayEnd);
      src.connect(lp); lp.connect(env); env.connect(audioCtx.destination);
      src.start(s);
    }
    rumbleLayer(0.08, 82,  vol * 0.68, 5.2);  // near — arrives first, loudest
    rumbleLayer(0.55, 54,  vol * 0.38, 6.0);  // mid  — 550ms later, quieter
    rumbleLayer(1.10, 36,  vol * 0.20, 6.8);  // far  — 1.1s later, deepest, quietest
  }

  // Sync thunder to already-running CSS lightning animations.
  // Calculate where each animation cycle is at button-click time using performance.now().
  const pageAge = performance.now();
  const p1=8000,  f1=2760, d1=1100;   // L1: 8s period, flash @34.5%, +1.1s sound delay
  const p2=11000, f2=6655, d2=1300;   // L2: 11s period, flash @60.5%, +1.3s sound delay
  const p3=14000, f3=2870, d3=900;    // L3: 14s period, flash @20.5%, +0.9s sound delay
  setTimeout(() => { thunder(0.75); setInterval(() => thunder(0.75), p1); }, ((f1 - pageAge % p1) + p1) % p1 + d1);
  setTimeout(() => { thunder(0.65); setInterval(() => thunder(0.65), p2); }, ((f2 - pageAge % p2) + p2) % p2 + d2);
  setTimeout(() => { thunder(0.58); setInterval(() => thunder(0.58), p3); }, ((f3 - pageAge % p3) + p3) % p3 + d3);

  // ── Wolf howl — 10% chance every 10s ──────────────────────────────────────
  function playWolf() {
    const t = audioCtx.currentTime;

    // Vibrato (slower than owl — 3.2Hz gives wolf-like wavering quality)
    const vibLFO   = audioCtx.createOscillator(); vibLFO.frequency.value = 3.2;
    const vibDepth = audioCtx.createGain();        vibDepth.gain.value = 9;
    vibLFO.connect(vibDepth);

    // Fundamental — sine, ~150-170Hz rising to ~320Hz then falling
    const osc  = audioCtx.createOscillator(); osc.type  = 'sine';
    // Second harmonic — gives body and prevents it blending into the wind drone
    const osc2 = audioCtx.createOscillator(); osc2.type = 'sine';
    vibDepth.connect(osc.frequency);
    vibDepth.connect(osc2.frequency);

    // Breath noise — narrow bandpass around the fundamental, gives the howl
    // texture and makes it audible even against the wind layer
    const breathSrc = audioCtx.createBufferSource();
    breathSrc.buffer = noiseBuffer(4.5);
    const breathBP = audioCtx.createBiquadFilter();
    breathBP.type = 'bandpass'; breathBP.frequency.value = 190; breathBP.Q.value = 2.8;
    const breathGain = audioCtx.createGain(); breathGain.gain.value = 0;
    breathSrc.connect(breathBP); breathBP.connect(breathGain);
    breathGain.connect(audioCtx.destination);

    const g1 = audioCtx.createGain(); g1.gain.value = 0;
    const g2 = audioCtx.createGain(); g2.gain.value = 0;
    osc.connect(g1);  g1.connect(audioCtx.destination);
    osc2.connect(g2); g2.connect(audioCtx.destination);

    // Howl shape: slow attack, rise to peak ~0.9s, hold, gradual fall
    const base = 148 + Math.random() * 22;
    osc.frequency.setValueAtTime(base, t);
    osc.frequency.linearRampToValueAtTime(base * 2.15, t + 0.9);
    osc.frequency.linearRampToValueAtTime(base * 1.55, t + 2.0);
    osc.frequency.linearRampToValueAtTime(base * 1.1,  t + 3.4);
    osc2.frequency.setValueAtTime(base * 2.02, t);
    osc2.frequency.linearRampToValueAtTime(base * 2.02 * 2.15, t + 0.9);
    osc2.frequency.linearRampToValueAtTime(base * 2.02 * 1.55, t + 2.0);
    osc2.frequency.linearRampToValueAtTime(base * 2.02 * 1.1,  t + 3.4);

    g1.gain.setValueAtTime(0, t);
    g1.gain.linearRampToValueAtTime(0.22, t + 0.45);
    g1.gain.setValueAtTime(0.22, t + 1.9);
    g1.gain.linearRampToValueAtTime(0.11, t + 2.7);
    g1.gain.exponentialRampToValueAtTime(0.001, t + 4.0);
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(0.07, t + 0.45);
    g2.gain.setValueAtTime(0.07, t + 1.9);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 3.6);
    breathGain.gain.setValueAtTime(0, t);
    breathGain.gain.linearRampToValueAtTime(0.055, t + 0.35);
    breathGain.gain.setValueAtTime(0.055, t + 1.8);
    breathGain.gain.exponentialRampToValueAtTime(0.001, t + 3.8);

    osc.start(t); osc2.start(t); vibLFO.start(t); breathSrc.start(t);
    osc.stop(t + 4.2); osc2.stop(t + 4.2); vibLFO.stop(t + 4.2);
  }
  setInterval(() => { if (Math.random() < 0.1) playWolf(); }, 10000);
});
</script>
</body>
</html>
